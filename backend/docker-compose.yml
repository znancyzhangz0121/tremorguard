services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tremorguard
      POSTGRES_USER: tremorguard
      POSTGRES_PASSWORD: tremorguard
    ports:
      - "5432:5432"
    volumes:
      - tremorguard-postgres:/var/lib/postgresql/data

volumes:
  tremorguard-postgres:
